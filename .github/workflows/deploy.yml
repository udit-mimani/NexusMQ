name: Build and Deploy NexusMQ

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: docker login uditportfolio.azurecr.io --username ${{ secrets.ACR_USERNAME }} --password ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: docker build -t uditportfolio.azurecr.io/nexusmq:latest .

      - name: Push Docker image
        run: docker push uditportfolio.azurecr.io/nexusmq:latest

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade
            az containerapp update \
              --name nexusmq \
              --resource-group udit-portfolio-rg \
              --image uditportfolio.azurecr.io/nexusmq:latest